<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VRC QVPen Drawing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#1a1a2e;color:#e0e0e0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
}

.toolbar{
  position:fixed;top:0;left:0;right:0;height:56px;
  background:#16213e;display:flex;align-items:center;
  padding:0 10px;gap:8px;z-index:20;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
  overflow-x:auto;overflow-y:hidden;
}
.toolbar button{
  background:#0f3460;color:#e0e0e0;border:none;
  padding:6px 14px;border-radius:8px;font-size:13px;
  cursor:pointer;min-height:36px;white-space:nowrap;
  transition:background .15s;flex-shrink:0;
}
.toolbar button:active{background:#533483}
.toolbar button.active{background:#e94560}
.toolbar .sep{width:1px;min-width:1px;height:28px;background:#334;flex-shrink:0}
.slider-group{display:flex;align-items:center;gap:4px;flex-shrink:0}
.slider-group label{font-size:12px;white-space:nowrap}
.slider-group input[type=range]{width:70px;accent-color:#e94560}
.slider-group .val{font-size:12px;min-width:22px;text-align:center}

.canvas-container{
  position:fixed;top:56px;left:0;right:0;bottom:0;
  background:#ffffff;
}
#refCanvas,#canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
}
#refCanvas{z-index:1;pointer-events:none}
#canvas{z-index:2;background:transparent;cursor:crosshair}
#canvas.eraser-mode{cursor:pointer}

.info{
  position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);padding:4px 14px;border-radius:12px;
  font-size:12px;z-index:20;pointer-events:none;
}

.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:100;justify-content:center;align-items:center;
}
.modal-bg.show{display:flex}
.modal{
  background:#16213e;border-radius:12px;padding:24px;
  min-width:280px;max-width:90vw;
}
.modal h3{margin-bottom:12px;font-size:16px}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal button{
  background:#0f3460;color:#e0e0e0;border:none;
  padding:8px 20px;border-radius:8px;font-size:14px;cursor:pointer;
}
.modal button.primary{background:#e94560}
.modal button:active{opacity:.8}

#refFileInput{display:none}
</style>
</head>
<body>

<div class="toolbar">
  <div class="slider-group">
    <label>補正:</label>
    <input type="range" id="smoothSlider" min="0" max="20" value="8">
    <span class="val" id="smoothVal">8</span>
  </div>
  <div class="sep"></div>
  <div class="slider-group">
    <label>太さ:</label>
    <input type="range" id="widthSlider" min="1" max="20" value="3">
    <span class="val" id="widthVal">3</span>
  </div>
  <div class="sep"></div>
  <button id="undoBtn">戻す</button>
  <button id="eraserBtn">消しゴム</button>
  <button id="clearBtn">全消去</button>
  <div class="sep"></div>
  <button id="refBtn" style="background:#7b2d8e">下絵</button>
  <div class="slider-group">
    <label>透過:</label>
    <input type="range" id="refOpacity" min="0" max="100" value="30">
    <span class="val" id="refOpacityVal">30%</span>
  </div>
  <button id="refClearBtn">下絵消去</button>
  <div class="sep"></div>
  <button id="resetViewBtn">表示リセット</button>
  <div class="sep"></div>
  <button id="exportBtn" style="background:#0a7e3f">保存</button>
</div>

<div class="canvas-container">
  <canvas id="refCanvas"></canvas>
  <canvas id="canvas"></canvas>
</div>

<input type="file" id="refFileInput" accept="image/*">

<div class="info">
  <span id="infoText">0 ストローク | 100% | 0°</span>
</div>

<div class="modal-bg" id="clearModal">
  <div class="modal">
    <h3>全消去しますか？</h3>
    <p style="font-size:14px;color:#aaa">全てのストロークが削除されます。</p>
    <div class="actions">
      <button id="clearCancel">キャンセル</button>
      <button id="clearConfirm" class="primary">消去</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const refCanvas = document.getElementById('refCanvas');
const refCtx = refCanvas.getContext('2d');

// --- State ---
let strokes = [];
let currentStroke = null;
let isDrawing = false;
let eraserMode = false;
let smoothX = 0, smoothY = 0;
let refImage = null;
let refOpacityValue = 0.3;

// --- View transform (zoom, pan, rotate) ---
let viewScale = 1;
let viewPanX = 0;
let viewPanY = 0;
let viewRotation = 0; // radians

// Pinch state
let isPinching = false;
let pinchStartDist = 0;
let pinchStartAngle = 0;
let pinchStartScale = 1;
let pinchStartRotation = 0;
let pinchStartMidX = 0;
let pinchStartMidY = 0;
let pinchStartPanX = 0;
let pinchStartPanY = 0;

// --- Coordinate transforms ---
function screenToWorld(sx, sy) {
  // Undo pan
  const tx = sx - viewPanX;
  const ty = sy - viewPanY;
  // Undo rotation
  const cosR = Math.cos(-viewRotation);
  const sinR = Math.sin(-viewRotation);
  const rx = tx * cosR - ty * sinR;
  const ry = tx * sinR + ty * cosR;
  // Undo scale
  return { x: rx / viewScale, y: ry / viewScale };
}

function worldToScreen(wx, wy) {
  // Apply scale
  const sx = wx * viewScale;
  const sy = wy * viewScale;
  // Apply rotation
  const cosR = Math.cos(viewRotation);
  const sinR = Math.sin(viewRotation);
  const rx = sx * cosR - sy * sinR;
  const ry = sx * sinR + sy * cosR;
  // Apply pan
  return { x: rx + viewPanX, y: ry + viewPanY };
}

// --- Canvas size ---
let canvasW = 0, canvasH = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight - 56;

  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  refCanvas.style.width = canvasW + 'px';
  refCanvas.style.height = canvasH + 'px';
  refCanvas.width = canvasW * dpr;
  refCanvas.height = canvasH * dpr;
  refCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

  drawRefImage();
  redraw();
}
window.addEventListener('resize', resize);
resize();

// --- Settings ---
const smoothSlider = document.getElementById('smoothSlider');
const smoothValEl = document.getElementById('smoothVal');
const widthSlider = document.getElementById('widthSlider');
const widthValEl = document.getElementById('widthVal');

smoothSlider.addEventListener('input', () => { smoothValEl.textContent = smoothSlider.value; });
widthSlider.addEventListener('input', () => { widthValEl.textContent = widthSlider.value; });

function getSmoothFactor() { return parseInt(smoothSlider.value); }
function getLineWidth() { return parseInt(widthSlider.value); }

// --- Reference image ---
const refOpacitySlider = document.getElementById('refOpacity');
const refOpacityValEl = document.getElementById('refOpacityVal');
const refFileInput = document.getElementById('refFileInput');

refOpacitySlider.addEventListener('input', () => {
  refOpacityValue = parseInt(refOpacitySlider.value) / 100;
  refOpacityValEl.textContent = refOpacitySlider.value + '%';
  drawRefImage();
});

document.getElementById('refBtn').addEventListener('click', () => { refFileInput.click(); });

refFileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => { refImage = img; drawRefImage(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  refFileInput.value = '';
});

document.getElementById('refClearBtn').addEventListener('click', () => {
  refImage = null;
  refCtx.clearRect(0, 0, canvasW, canvasH);
});

function drawRefImage() {
  refCtx.clearRect(0, 0, canvasW, canvasH);
  if (!refImage) return;

  // Calculate image fit in world coordinates
  const imgAspect = refImage.width / refImage.height;
  const canvasAspect = canvasW / canvasH;
  let drawW, drawH, drawX, drawY;
  if (imgAspect > canvasAspect) {
    drawW = canvasW; drawH = canvasW / imgAspect;
    drawX = 0; drawY = (canvasH - drawH) / 2;
  } else {
    drawH = canvasH; drawW = canvasH * imgAspect;
    drawX = (canvasW - drawW) / 2; drawY = 0;
  }

  // Draw the 4 corners in screen space and use canvas transform
  refCtx.save();
  refCtx.globalAlpha = refOpacityValue;

  // Apply view transform to refCtx
  refCtx.translate(viewPanX, viewPanY);
  refCtx.rotate(viewRotation);
  refCtx.scale(viewScale, viewScale);
  refCtx.drawImage(refImage, drawX, drawY, drawW, drawH);
  refCtx.restore();
}

// --- Drawing ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  let sx, sy;
  if (e.touches && e.touches.length > 0) {
    sx = e.touches[0].clientX - rect.left;
    sy = e.touches[0].clientY - rect.top;
  } else {
    sx = e.clientX - rect.left;
    sy = e.clientY - rect.top;
  }
  return screenToWorld(sx, sy);
}

function smoothPoint(raw) {
  const s = getSmoothFactor();
  if (s === 0 || !currentStroke || currentStroke.points.length === 0) {
    smoothX = raw.x; smoothY = raw.y;
  } else {
    const alpha = 1 / (1 + s * 0.8);
    smoothX = alpha * raw.x + (1 - alpha) * smoothX;
    smoothY = alpha * raw.y + (1 - alpha) * smoothY;
  }
  return { x: smoothX, y: smoothY };
}

function startStroke(e) {
  if (eraserMode || isPinching) return;
  e.preventDefault();
  isDrawing = true;
  const raw = getPos(e);
  const p = smoothPoint(raw);
  currentStroke = {
    points: [{ x: p.x, y: p.y, t: 0 }],
    width: getLineWidth(),
    _startTime: performance.now()
  };
  const sp = worldToScreen(p.x, p.y);
  ctx.beginPath();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = currentStroke.width * viewScale;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(sp.x, sp.y);
}

function moveStroke(e) {
  if (!isDrawing || !currentStroke || isPinching) return;
  e.preventDefault();
  const raw = getPos(e);
  const p = smoothPoint(raw);
  const t = performance.now() - currentStroke._startTime;
  currentStroke.points.push({ x: p.x, y: p.y, t: Math.round(t) });

  const sp = worldToScreen(p.x, p.y);
  ctx.lineTo(sp.x, sp.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = currentStroke.width * viewScale;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.moveTo(sp.x, sp.y);
}

function endStroke(e) {
  if (!isDrawing || !currentStroke) return;
  if (e) e.preventDefault();
  isDrawing = false;
  if (currentStroke.points.length >= 2) {
    delete currentStroke._startTime;
    strokes.push(currentStroke);
  }
  currentStroke = null;
  ctx.beginPath();
  updateInfo();
}

// --- Pinch helpers ---
function getTouchDist(e) {
  const t = e.touches;
  return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
}

function getTouchAngle(e) {
  const t = e.touches;
  return Math.atan2(t[1].clientY - t[0].clientY, t[1].clientX - t[0].clientX);
}

function getTouchMid(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches;
  return {
    x: (t[0].clientX + t[1].clientX) / 2 - rect.left,
    y: (t[0].clientY + t[1].clientY) / 2 - rect.top
  };
}

// --- Canvas events ---
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length === 2) {
    if (isDrawing) { isDrawing = false; currentStroke = null; ctx.beginPath(); }
    isPinching = true;
    pinchStartDist = getTouchDist(e);
    pinchStartAngle = getTouchAngle(e);
    pinchStartScale = viewScale;
    pinchStartRotation = viewRotation;
    const mid = getTouchMid(e);
    pinchStartMidX = mid.x;
    pinchStartMidY = mid.y;
    pinchStartPanX = viewPanX;
    pinchStartPanY = viewPanY;
    return;
  }
  if (e.touches.length === 1 && !isPinching) {
    if (eraserMode) { handleEraserTap(e); return; }
    startStroke(e);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (isPinching && e.touches.length === 2) {
    const dist = getTouchDist(e);
    const angle = getTouchAngle(e);
    const mid = getTouchMid(e);

    const newScale = Math.min(Math.max(pinchStartScale * (dist / pinchStartDist), 0.2), 10);
    const newRotation = pinchStartRotation + (angle - pinchStartAngle);

    // World point that was under the initial pinch midpoint
    const cosR0 = Math.cos(-pinchStartRotation);
    const sinR0 = Math.sin(-pinchStartRotation);
    const tx0 = pinchStartMidX - pinchStartPanX;
    const ty0 = pinchStartMidY - pinchStartPanY;
    const worldX = (tx0 * cosR0 - ty0 * sinR0) / pinchStartScale;
    const worldY = (tx0 * sinR0 + ty0 * cosR0) / pinchStartScale;

    // That world point should now appear at current mid
    const sx = worldX * newScale;
    const sy = worldY * newScale;
    const cosR1 = Math.cos(newRotation);
    const sinR1 = Math.sin(newRotation);
    const rx = sx * cosR1 - sy * sinR1;
    const ry = sx * sinR1 + sy * cosR1;

    viewScale = newScale;
    viewRotation = newRotation;
    viewPanX = mid.x - rx;
    viewPanY = mid.y - ry;

    drawRefImage();
    redraw();
    updateInfo();
    return;
  }
  moveStroke(e);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (isPinching) {
    if (e.touches.length < 2) isPinching = false;
    return;
  }
  endStroke(e);
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  isPinching = false;
  endStroke(e);
}, { passive: false });

// Mouse events (PC)
canvas.addEventListener('mousedown', (e) => {
  if (eraserMode) { handleEraserTap(e); return; }
  startStroke(e);
});
canvas.addEventListener('mousemove', moveStroke);
canvas.addEventListener('mouseup', endStroke);
canvas.addEventListener('mouseleave', endStroke);

// Mouse wheel zoom (PC)
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const world = screenToWorld(mx, my);
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  viewScale = Math.min(Math.max(viewScale * factor, 0.2), 10);
  // Keep world point under cursor
  const sp = worldToScreen(world.x, world.y);
  viewPanX += mx - sp.x;
  viewPanY += my - sp.y;
  drawRefImage();
  redraw();
  updateInfo();
}, { passive: false });

canvas.addEventListener('gesturestart', e => e.preventDefault());
canvas.addEventListener('gesturechange', e => e.preventDefault());

// --- Eraser ---
function handleEraserTap(e) {
  if (!eraserMode) return;
  e.preventDefault();
  const pos = getPos(e);
  const threshold = 20 / viewScale;
  let bestIdx = -1;
  let bestDist = Infinity;
  for (let i = strokes.length - 1; i >= 0; i--) {
    for (const pt of strokes[i].points) {
      const d = Math.hypot(pt.x - pos.x, pt.y - pos.y);
      if (d < threshold && d < bestDist) {
        bestDist = d;
        bestIdx = i;
      }
    }
  }
  if (bestIdx >= 0) {
    strokes.splice(bestIdx, 1);
    redraw();
    updateInfo();
  }
}

// --- Redraw ---
function redraw() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;
    ctx.beginPath();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = stroke.width * viewScale;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const s0 = worldToScreen(stroke.points[0].x, stroke.points[0].y);
    ctx.moveTo(s0.x, s0.y);
    for (let i = 1; i < stroke.points.length; i++) {
      const sp = worldToScreen(stroke.points[i].x, stroke.points[i].y);
      ctx.lineTo(sp.x, sp.y);
    }
    ctx.stroke();
  }
}

// --- UI ---
function updateInfo() {
  const pct = Math.round(viewScale * 100);
  let deg = Math.round(viewRotation * 180 / Math.PI) % 360;
  if (deg < 0) deg += 360;
  document.getElementById('infoText').textContent =
    strokes.length + ' ストローク | ' + pct + '% | ' + deg + '\u00B0';
}

document.getElementById('undoBtn').addEventListener('click', () => {
  if (strokes.length > 0) { strokes.pop(); redraw(); updateInfo(); }
});

const eraserBtn = document.getElementById('eraserBtn');
eraserBtn.addEventListener('click', () => {
  eraserMode = !eraserMode;
  eraserBtn.classList.toggle('active', eraserMode);
  canvas.classList.toggle('eraser-mode', eraserMode);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (strokes.length === 0) return;
  document.getElementById('clearModal').classList.add('show');
});
document.getElementById('clearCancel').addEventListener('click', () => {
  document.getElementById('clearModal').classList.remove('show');
});
document.getElementById('clearConfirm').addEventListener('click', () => {
  strokes = [];
  redraw();
  updateInfo();
  document.getElementById('clearModal').classList.remove('show');
});

// Reset view
document.getElementById('resetViewBtn').addEventListener('click', () => {
  viewScale = 1; viewPanX = 0; viewPanY = 0; viewRotation = 0;
  drawRefImage();
  redraw();
  updateInfo();
});

// --- Export ---
document.getElementById('exportBtn').addEventListener('click', () => {
  if (strokes.length === 0) { alert('描画データがありません'); return; }
  const data = {
    version: 1,
    canvas: { width: canvasW, height: canvasH },
    smoothing: getSmoothFactor(),
    strokes: strokes.map((s, i) => ({
      id: i, width: s.width,
      points: s.points.map(p => ({
        x: Math.round(p.x * 100) / 100,
        y: Math.round(p.y * 100) / 100,
        t: p.t
      }))
    }))
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const ts = now.getFullYear()
    + String(now.getMonth()+1).padStart(2,'0')
    + String(now.getDate()).padStart(2,'0') + '_'
    + String(now.getHours()).padStart(2,'0')
    + String(now.getMinutes()).padStart(2,'0')
    + String(now.getSeconds()).padStart(2,'0');
  a.download = 'qvpen_drawing_' + ts + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    if (strokes.length > 0) { strokes.pop(); redraw(); updateInfo(); }
  }
});

updateInfo();
</script>
</body>
</html>
